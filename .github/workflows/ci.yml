name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-typecheck-test:
    name: Lint, typecheck, test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint (ESLint)
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

  validate-graph:
    name: Validate graph data
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Schema validation
        run: pnpm validate

      - name: ID grammar checks
        run: pnpm lint-ids

      - name: Referential integrity
        run: pnpm check-references

      - name: Anchor validation
        run: pnpm check-anchors

      - name: Publication gate
        run: pnpm check-publication-gate

      - name: Contradiction detection
        run: pnpm check-contradictions

      - name: Scenario tests
        run: pnpm test-scenarios

      - name: Export JSON (smoke test)
        run: pnpm export-json

      - name: Export Web (smoke test)
        run: pnpm export-web
