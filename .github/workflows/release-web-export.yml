name: Release Web Export

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  export-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web export
        run: pnpm export-web

      - name: Package export artifact
        run: |
          cd build/exports/web
          tar -czf ../../../clarvia-web-export-${{ github.event.release.tag_name }}.tar.gz .

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            clarvia-web-export-${{ github.event.release.tag_name }}.tar.gz \
            --clobber
