name: Release Web Export

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  export-web:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build web export
        run: pnpm export-web

      - name: Package export artifact
        run: |
          cd build/exports/web
          tar -czf ../../../clarvia-web-export-${{ github.event.release.tag_name }}.tar.gz .

      - name: Upload release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            clarvia-web-export-${{ github.event.release.tag_name }}.tar.gz \
            --clobber
