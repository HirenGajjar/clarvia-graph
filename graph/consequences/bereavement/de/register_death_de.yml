id: consequence.de.bereavement.death_registration.register_death_de
schema_version: "0.1.0"
title: "Death must be registered at the Standesamt"
description: >
  When a death occurs in Germany, it must be registered at the Standesamt
  (registry office) of the district where the death took place. This is a
  legal obligation under the Personenstandsgesetz (PStG).
