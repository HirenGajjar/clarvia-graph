title: "Survivor may claim pension from Deutsche Rentenversicherung"
description: >
  When the deceased was insured under the German statutory pension system,
  eligible survivors (spouse, registered partner, or children) may have the
  right to claim a survivor pension (Hinterbliebenenrente) from the Deutsche
  Rentenversicherung.
