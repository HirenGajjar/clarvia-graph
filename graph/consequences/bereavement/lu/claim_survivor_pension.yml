title: "Surviving spouse may be entitled to a survivor pension"
description: >
  The surviving spouse or partner of a person who was insured with the Luxembourg
  pension system may be entitled to a survivor pension (pension de survie) from
  CNAP. The claim must be filed within a deadline.
