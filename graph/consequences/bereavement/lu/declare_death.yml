id: consequence.lu.bereavement.death_registration.declare_death
schema_version: "0.1.0"
title: "Death must be declared to the civil registry"
description: >
  When a death occurs in Luxembourg, it must be declared to the Bureau de l'état
  civil of the commune where the death took place. This is a legal obligation
  that triggers the issuance of the death certificate.
consequence_type: obligation
