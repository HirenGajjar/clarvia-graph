id: condition.de.bereavement.survivor_pension.deceased_was_de_insured
schema_version: "0.1.0"
title: "Deceased was insured under German pension system"
description: >
  Evaluates whether the deceased was insured under the German statutory
  pension system (Deutsche Rentenversicherung). If true, survivor pension
  rights under German law may apply.
condition_type: criterion
jurisdiction: DE
life_event: bereavement
domain: survivor_pension
expression_language: jsonlogic
expression:
  "==":
    - { "var": "deceased.last_social_security_affiliation.country" }
    - "DE"
missing_fact_behavior: unknown
information_concept_refs:
  - intake_fact.global.bereavement.deceased_pension_jurisdiction
source_assertion_refs: []
record_valid_from: "2026-06-03"
authoring_status: draft
distribution_status: public_open
