label: How many months were you living with the deceased before their death?
label_en: How many months were you living with the deceased before their death?
label_fr: Combien de mois viviez-vous avec le défunt avant son décès ?
label_de: Wie viele Monate haben Sie vor dem Tod mit dem Verstorbenen zusammengelebt?
description: >
  Number of months the survivor was living in domestic community with the
  deceased immediately before the death. Used to determine housing rights
  (e.g., right to remain in shared dwelling if >= 6 months).
value_type: integer
