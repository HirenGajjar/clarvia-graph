id: task_template.de.bereavement.death_registration.register_death_standesamt
schema_version: "0.1.0"
title: "Register death at Standesamt"
description: >
  Register the death at the Standesamt (registry office) of the district where
  the death occurred. Under the Personenstandsgesetz, this must be done within
  the legal deadline. Required documents include the medical death certificate
  (Todesbescheinigung) and identity documents of the deceased.
action_type: register_death
jurisdiction: DE
jurisdiction_uri: "http://publications.europa.eu/resource/authority/country/DEU"
life_event: bereavement
