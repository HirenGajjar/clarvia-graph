id: task_template.de.bereavement.survivor_pension.file_drv_claim
schema_version: "0.1.0"
title: "File survivor pension claim with DRV"
description: >
  File a claim for survivor pension (Hinterbliebenenrente) with the Deutsche
  Rentenversicherung. Eligible survivors include spouses, registered partners,
  and orphaned children. The claim requires the death certificate, marriage
  certificate or proof of partnership, and pension insurance documentation.
