assertions:
  - id: assertion.guichet_lu.bereavement.death_must_be_declared
    schema_version: "0.1.0"
    claim_type: legal_scope
    claim_text: >
      When a death occurs in Luxembourg, the family must declare the death to
      the Bureau de l'état civil of the commune where the death took place.
    claim_scope:
      jurisdiction: LU
      life_event: bereavement
      domain: death_registration
    anchor:
      selector_type: text_quote
      text_quote: "declared within 24 hours to the civil registrar's office"
    source_tier: official_guidance
    record_valid_from: "2026-06-03"
    review_status: approved
    confidence: medium
    provenance:
      extraction_method: ai_assisted
      extracted_at: "2026-06-03T12:00:00Z"

  - id: assertion.guichet_lu.bereavement.declaration_within_24h
    schema_version: "0.1.0"
    claim_type: deadline
    claim_text: >
      The death declaration must be made within 24 hours of the death.
    claim_scope:
      jurisdiction: LU
      life_event: bereavement
      domain: death_registration
    anchor:
      selector_type: text_quote
      text_quote: "within 24 hours"
    extracted_value:
