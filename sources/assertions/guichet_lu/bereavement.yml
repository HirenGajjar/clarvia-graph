  - id: assertion.guichet_lu.bereavement.survivor_pension_available
    schema_version: "0.1.0"
    claim_type: eligibility_condition
    claim_text: >
      The surviving spouse may be entitled to a survivor pension (pension de survie)
      if the deceased was insured with the Luxembourg pension system.
    claim_scope:
      jurisdiction: LU
      life_event: bereavement
      domain: survivor_pension
    anchor:
