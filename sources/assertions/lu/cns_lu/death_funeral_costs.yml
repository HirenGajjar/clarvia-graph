- id: assertion.cns_lu.death_funeral_costs.funeral_indemnity_covers_costs
  schema_version: "0.1.0"
  claim_type: legal_scope
  claim_text: >-
    The CNS funeral indemnity is financial aid intended to cover all or part of funeral costs for an insured or co-insured deceased person in Luxembourg.
  claim_scope:
    jurisdiction: LU
