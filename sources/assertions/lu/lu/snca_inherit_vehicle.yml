- id: assertion.lu.snca_inherit_vehicle.new_registration_certificate_required
  schema_version: "0.1.0"
  claim_type: legal_scope
  claim_text: >-
    After the death of a vehicle holder or owner, the surviving spouse or heir must obtain a new registration certificate in their own name before the vehicle is used on public roads.
  claim_scope:
    jurisdiction: LU
    life_event: bereavement
    domain: estate_assets
  anchor:
