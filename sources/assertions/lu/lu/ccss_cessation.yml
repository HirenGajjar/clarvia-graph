- id: assertion.lu.ccss_cessation.self_employed_must_notify_ccss
  schema_version: "0.1.0"
  claim_type: legal_scope
  claim_text: >-
    A self-employed person who temporarily or permanently stops their activity must inform the CCSS; the same applies to their assisting spouse.
  claim_scope:
