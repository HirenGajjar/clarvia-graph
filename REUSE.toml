# ── Source code (tooling, validators, exporters) ─────────────────────

[[annotations]]
path = [
  "packages/**/*.ts",
  "packages/**/*.mjs",
  "packages/**/*.json",
  "packages/**/*.snap",
]
SPDX-FileCopyrightText = "2025-2026 CLARVIA ASBL, Luxembourg"
SPDX-License-Identifier = "EUPL-1.2"

# ── Graph data (YAML knowledge graph records) ────────────────────────

[[annotations]]
path = [
  "graph/**/*.yml",
  "graph/**/*.yaml",
]
SPDX-FileCopyrightText = "2025-2026 CLARVIA ASBL, Luxembourg"
SPDX-License-Identifier = "CC-BY-4.0"

# ── Controlled vocabularies ──────────────────────────────────────────

[[annotations]]
path = "vocab/**/*.yml"
SPDX-FileCopyrightText = "2025-2026 CLARVIA ASBL, Luxembourg"
SPDX-License-Identifier = "CC-BY-4.0"

# ── Schemas ──────────────────────────────────────────────────────────

[[annotations]]
path = "schemas/**/*.json"
SPDX-FileCopyrightText = "2025-2026 CLARVIA ASBL, Luxembourg"
SPDX-License-Identifier = "CC-BY-4.0"

# ── Source assertions (original Clarvia analytical work) ─────────────

[[annotations]]
path = [
  "sources/assertions/**/*.yml",
  "sources/assertions/**/*.yaml",
]
SPDX-FileCopyrightText = "2025-2026 CLARVIA ASBL, Luxembourg"
SPDX-License-Identifier = "EUPL-1.2"

# ── Source registry and per-provider records ─────────────────────────

[[annotations]]
path = [
  "sources/*.yml",
  "sources/*.yaml",
  "sources/**/*.yml",
]
SPDX-FileCopyrightText = "2025-2026 CLARVIA ASBL, Luxembourg"
SPDX-License-Identifier = "EUPL-1.2"

# ── Source snapshot metadata (YAML capture records) ──────────────────

[[annotations]]
path = [
  "sources/snapshots/**/*.yml",
  "sources/snapshots/**/*.yaml",
]
SPDX-FileCopyrightText = "2025-2026 CLARVIA ASBL, Luxembourg"
SPDX-License-Identifier = "EUPL-1.2"

# ── Captured HTML snapshots from government websites ─────────────────
# Archived copies of publicly available government pages from any
# jurisdiction. The archival act is EUPL-1.2; the page content itself
# is typically public domain under national law.

[[annotations]]
path = "sources/snapshots/html/**/*.html"
SPDX-FileCopyrightText = "Various government agencies (archived by CLARVIA ASBL)"
SPDX-License-Identifier = "LicenseRef-Gov-PublicDomain"

